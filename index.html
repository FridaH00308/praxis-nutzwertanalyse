<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stärken- &amp; Kompetenzprofil – Paul | Zahnärzte</title>
<link rel="icon" href="logo-paul.png" />
<style>
  /* Markenfarben Zahnarztpraxis Paul (aus Logo abgeleitet) */
  :root{ --brand:#902538; --brand-d:#6f1c2b; --brand-l:#f6e9ec; --brand-ll:#fbf4f5;
         --ink:#241a1d; --mut:#6b5f62; --line:#e3d7da; --bg:#f6f3f4;
         --ok:#2e7d57; --warn:#b23b2a; }
  *{box-sizing:border-box}
  body{margin:0;font-family:Arial,Helvetica,sans-serif;color:var(--ink);background:var(--bg);font-size:15px}
  a{color:var(--brand)}
  .wrap{max-width:1000px;margin:0 auto;padding:18px}
  .topbar{background:var(--brand);color:#fff;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:12px;min-width:0}
  .brand img{height:26px;width:auto;display:block}
  .brand .sub{font-size:13px;color:#ffffffcc;border-left:1px solid #ffffff55;padding-left:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  @media(max-width:560px){.brand .sub{display:none}}
  .btn{background:var(--brand);color:#fff;border:none;border-radius:8px;padding:9px 14px;font-size:14px;cursor:pointer;font-family:inherit}
  .btn:hover{background:var(--brand-d)}
  .btn.sec{background:#fff;color:var(--brand);border:1px solid var(--brand)}
  .btn.sec:hover{background:var(--brand-l)}
  .btn.ghost{background:transparent;color:#fff;border:1px solid #ffffff66}
  .btn.ghost:hover{background:#ffffff1f}
  .btn.danger{background:var(--warn)}
  .btn.sm{padding:5px 9px;font-size:13px;border-radius:6px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;margin:14px 0;box-shadow:0 1px 2px #0000000a}
  .center{max-width:460px;margin:34px auto}
  h1,h2,h3{color:var(--brand)} h1{font-size:26px;margin:.2em 0}
  label{display:block;font-size:13px;color:var(--mut);margin:10px 0 4px}
  input,select,textarea{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-size:15px;font-family:inherit;background:#fff}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--brand-l);border-color:var(--brand)}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row>*{flex:1}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:bold}
  .pill.draft{background:#eee;color:#555}.pill.released{background:#dff0e6;color:var(--ok)}
  .pill.locked{background:#fbe6df;color:var(--warn)}.pill.completed{background:var(--brand-l);color:var(--brand)}
  .err{background:#fbe6df;color:var(--warn);padding:9px;border-radius:8px;margin:8px 0;font-size:14px}
  .ok{background:#dff0e6;color:var(--ok);padding:9px;border-radius:8px;margin:8px 0;font-size:14px}
  .muted{color:var(--mut);font-size:13px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top}
  th{background:var(--brand-l);color:var(--brand)}
  .sec-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer;padding:10px 12px;background:var(--brand-l);
            border:1px solid var(--line);border-radius:8px;margin-top:8px;font-weight:bold;color:var(--brand)}
  .scale{display:flex;gap:4px;flex-wrap:wrap}
  .sbtn{border:1px solid var(--line);background:#fff;border-radius:6px;padding:5px 9px;cursor:pointer;font-size:13px;min-width:34px;text-align:center}
  .sbtn.on{background:var(--brand);color:#fff;border-color:var(--brand)}
  .sbtn.g0.on{background:#9aa5a1;border-color:#9aa5a1}
  .item{border-bottom:1px solid var(--line);padding:10px 4px}
  .item:last-child{border-bottom:none}
  .item.hl{background:var(--brand-ll);border-radius:8px}
  .tag{font-family:monospace;background:var(--brand-l);color:var(--brand);padding:2px 8px;border-radius:6px;font-weight:bold;letter-spacing:1px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:640px){.grid2{grid-template-columns:1fr}}
  /* Fortschrittsbalken */
  .prog{display:flex;align-items:center;gap:10px;margin-top:10px}
  .prog .bar{flex:1;height:9px;background:var(--brand-l);border-radius:999px;overflow:hidden}
  .prog .bar>i{display:block;height:100%;background:var(--brand);border-radius:999px;transition:width .3s}
  .prog .txt{font-size:13px;color:var(--mut);white-space:nowrap}
  /* Home-Logo */
  .home-logo{display:block;margin:0 auto 14px;max-width:260px;width:70%;height:auto}
</style>
</head>
<body>
<div id="root"></div>

<!-- Konfiguration & Katalog -->
<script src="config.js"></script>
<script src="catalog.js"></script>
<!-- Bibliotheken -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // JSX im klassischen Modus übersetzen (React.createElement statt Modul-Import),
  // damit es ohne Build-Schritt direkt im Browser läuft.
  Babel.registerPreset("react-classic", {
    presets: [[Babel.availablePresets["react"], { runtime: "classic" }]],
  });
</script>

<script type="text/babel" data-presets="react-classic">
const { useState, useEffect, useCallback, useRef } = React;
const CFG = window.APP_CONFIG || {};
// Einfache In-Memory-Sperre statt der browserweiten Navigator-LockManager-Sperre.
// Diese App wird pro Browser von genau einer Person genutzt – damit vermeiden wir
// seltene, schwer zu findende Deadlocks über mehrere Tabs/Kontexte hinweg.
const db = supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_ANON_KEY, {
  auth: { lock: async (_name, _timeout, fn) => await fn() },
});
const CATALOG = window.CATALOG, G_SCALE = window.G_SCALE, B_SCALE = window.B_SCALE;
const FN_BASE = (CFG.SUPABASE_URL || "") + "/functions/v1";
const BRAND = "#902538", BRAND_L = "#f6e9ec";
const LOGO_URL = "logo-paul.png";          // Burgunder-Logo (helle Flächen, Word)
const LOGO_WHITE_URL = "logo-paul-white.png"; // weißes Logo (Header-Balken)

/* ---------- Hilfen ---------- */
const itemKey = (si, ii) => si + "_" + ii;
const uid = ()=>"c_"+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const randCode = (n=6)=>{const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";let s="";for(let i=0;i<n;i++)s+=c[Math.floor(Math.random()*c.length)];return s;};
const fmt1 = x => x==null?"–":(Math.round(x*10)/10).toString().replace(".",",");
const pct = x => x==null?"–":Math.round(x*100)+" %";

// Selbstverwaltung des Mitarbeiters (Passwort/E-Mail) über die Edge-Function.
async function callSelf(action,payload){
  const {data:{session}}=await db.auth.getSession();
  if(!session) throw new Error("Nicht angemeldet.");
  const r=await fetch(FN_BASE+"/employee-self",{method:"POST",
    headers:{Authorization:"Bearer "+session.access_token,"Content-Type":"application/json"},
    body:JSON.stringify({action,...payload})});
  const j=await r.json(); if(!r.ok)throw new Error(j.error||"Fehler"); return j;
}

// Praxis-Katalog (aus DB) mit den eigenen (pro Zyklus ergänzten) Kriterien zusammenführen.
// catalog: [{id,name,items:[{item_key,criterion,description,id}]}] – aus loadCatalog().
// customs: Zeilen aus custom_items. Jede gehört per "section" (Name) zu einem Bereich.
function buildSections(catalog, customs){
  const byName={};
  (customs||[]).forEach(c=>{(byName[c.section]=byName[c.section]||[]).push(c);});
  return (catalog||[]).map((sec, si)=>{
    const base=sec.items.map(it=>({key:it.item_key, k:it.criterion, d:it.description||"", custom:false}));
    const extra=(byName[sec.name]||[]).map(c=>({key:c.item_key, k:c.criterion, d:c.description||"", custom:true, id:c.id, author:c.author}));
    return {name:sec.name, si, items:base.concat(extra)};
  });
}

// Praxis-Katalog aus der Datenbank laden (Bereiche + Kriterien, in Reihenfolge).
async function loadCatalog(practiceId){
  const {data:secs}=await db.from("catalog_sections").select("*").eq("practice_id",practiceId).order("sort_order");
  const {data:items}=await db.from("catalog_items").select("*").eq("practice_id",practiceId).order("sort_order");
  const bySec={}; (items||[]).forEach(i=>{(bySec[i.section_id]=bySec[i.section_id]||[]).push(i);});
  return (secs||[]).map(s=>({id:s.id, name:s.name,
    items:(bySec[s.id]||[]).map(i=>({item_key:i.item_key, criterion:i.criterion, description:i.description, id:i.id, sort_order:i.sort_order}))}));
}

// Beim ersten Mal den Katalog aus der Standardliste (window.CATALOG) vorbefüllen.
// item_key = "si_ii" bleibt kompatibel mit bereits erfassten Bewertungen.
async function seedCatalogIfEmpty(practiceId){
  const {count}=await db.from("catalog_sections").select("id",{count:"exact",head:true}).eq("practice_id",practiceId);
  if(count && count>0) return;
  const secRows=CATALOG.map(([name],si)=>({practice_id:practiceId,name,sort_order:si}));
  const {data:secs,error}=await db.from("catalog_sections").insert(secRows).select();
  if(error||!secs) return;
  const byOrder={}; secs.forEach(s=>{byOrder[s.sort_order]=s.id;});
  const itemRows=[];
  CATALOG.forEach(([name,items],si)=>items.forEach(([k,d],ii)=>{
    itemRows.push({practice_id:practiceId,section_id:byOrder[si],item_key:itemKey(si,ii),criterion:k,description:d||null,sort_order:ii});
  }));
  if(itemRows.length) await db.from("catalog_items").insert(itemRows);
}

function computeAll(sectionsDef, fk, ma){
  // sectionsDef: Ausgabe von buildSections(); fk: {key:{g,b}}, ma:{key:{b}}
  const sections = sectionsDef.map((sec)=>{
    let max=0, nFk=0, nMa=0, agSum=0, agCnt=0, done=0;
    sec.items.forEach((it)=>{
      const k=it.key;
      const g=(fk[k]&&fk[k].g)||0;
      const bFk=(fk[k]&&fk[k].b)||0;
      const bMa=(ma[k]&&ma[k].b)||0;
      max+=g*5; nFk+=g*bFk; nMa+=g*bMa;
      if(bFk&&bMa){ agSum+=1-Math.abs(bMa-bFk)/5; agCnt++; }
      if(g||bFk||bMa) done++;
    });
    return {name:sec.name, si:sec.si, max, nFk, nMa, done, total:sec.items.length,
            agree: agCnt? agSum/agCnt : null};
  });
  const tot = sections.reduce((a,s)=>({max:a.max+s.max,nFk:a.nFk+s.nFk,nMa:a.nMa+s.nMa}),{max:0,nFk:0,nMa:0});
  const agAll = sections.filter(s=>s.agree!=null);
  tot.agree = agAll.length? agAll.reduce((a,s)=>a+s.agree,0)/agAll.length : null;
  return {sections, tot};
}

/* ---------- Score-Picker ---------- */
function Picker({scale, value, onChange, disabled, g}){
  return <div className="scale">{scale.map(s=>
    <div key={s.v}
      className={"sbtn "+(g&&s.v===0?"g0 ":"")+(value===s.v?"on":"")}
      title={s.label}
      onClick={()=>!disabled && onChange(value===s.v?null:s.v)}
      style={disabled?{opacity:.6,cursor:"default"}:{}}>{s.short}</div>)}</div>;
}

/* ================= APP ================= */
function App(){
  const [boot,setBoot]=useState(true);
  const [view,setView]=useState("home"); // home|fkAuth|fk|maLogin|ma
  const [practice,setPractice]=useState(null);
  const [employee,setEmployee]=useState(null);
  const [recovery,setRecovery]=useState(false); // Passwort-Zurücksetzen über E-Mail-Link

  useEffect(()=>{
    // Reset-Link erkennen (Event kann beim Laden schon gefeuert haben).
    if(/type=recovery/.test(window.location.hash||"")) setRecovery(true);
    const {data:sub}=db.auth.onAuthStateChange((event)=>{ if(event==="PASSWORD_RECOVERY") setRecovery(true); });
    return ()=>{ try{sub.subscription.unsubscribe();}catch(e){} };
  },[]);

  const detect = useCallback(async ()=>{
    const {data:{session}} = await db.auth.getSession();
    if(!session){ setView("home"); setBoot(false); return; }
    const uid = session.user.id;
    const {data:pr} = await db.from("practices").select("*").eq("owner",uid).maybeSingle();
    if(pr){ setPractice(pr); setView("fk"); setBoot(false); return; }
    const {data:emp} = await db.from("employees").select("*").eq("auth_uid",uid).maybeSingle();
    if(emp){ setEmployee(emp); setView("ma"); setBoot(false); return; }
    setView("home"); setBoot(false);
  },[]);
  useEffect(()=>{ detect(); },[detect]);

  async function logout(){ await db.auth.signOut(); setPractice(null); setEmployee(null); setView("home"); }

  if(!CFG.SUPABASE_URL || CFG.SUPABASE_URL.includes("DEINPROJEKT")){
    return <div className="center card"><h2>Fast fertig</h2><p>Bitte tragen Sie in <b>config.js</b> Ihre Supabase-Daten ein (siehe README, Schritt 2).</p></div>;
  }
  if(recovery) return <RecoveryReset onDone={()=>{setRecovery(false);detect();}}/>;
  if(boot) return <div className="center"><p className="muted">Lädt…</p></div>;

  return <div>
    <div className="topbar">
      <div className="brand">
        <img src={LOGO_WHITE_URL} alt="Paul | Zahnärzte"/>
        <span className="sub">Stärken- &amp; Kompetenzprofil</span>
      </div>
      <div>{(view==="fk"||view==="ma") &&
        <button className="btn ghost btn sm" onClick={logout}>Abmelden</button>}</div>
    </div>
    <div className="wrap">
      {view==="home" && <Home onFK={()=>setView("fkAuth")} onMA={()=>setView("maLogin")}/>}
      {view==="fkAuth" && <FKAuth onBack={()=>setView("home")} onReady={p=>{setPractice(p);setView("fk");}}/>}
      {view==="fk" && practice && <FKApp practice={practice} setPractice={setPractice}/>}
      {view==="maLogin" && <MALogin onBack={()=>setView("home")} onReady={()=>detect()}/>}
      {view==="ma" && employee && (employee.must_change_pw
        ? <FirstLoginSetup employee={employee} onDone={()=>detect()}/>
        : <MAApp employee={employee} reloadEmployee={()=>detect()}/>)}
    </div>
  </div>;
}

/* ---------- Startseite ---------- */
function Home({onFK,onMA}){
  return <div className="center">
    <div className="card" style={{textAlign:"center"}}>
      <img className="home-logo" src={LOGO_URL} alt="Paul | Zahnärzte"/>
      <h1>Stärken- &amp; Kompetenzprofil</h1>
      <p className="muted">Bewertung von Wissensstand und Entwicklungspotenzial im Team der Zahnarztpraxis Paul.</p>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginTop:18}}>
        <button className="btn" onClick={onFK}>Als Führungskraft anmelden</button>
        <button className="btn sec" onClick={onMA}>Als Mitarbeiter:in anmelden</button>
      </div>
    </div>
  </div>;
}

/* ---------- FK Auth ---------- */
function FKAuth({onBack,onReady}){
  const [tab,setTab]=useState("login");
  const [email,setEmail]=useState(""),[pw,setPw]=useState(""),[pname,setPname]=useState("");
  const [err,setErr]=useState(""),[msg,setMsg]=useState(""),[busy,setBusy]=useState(false);

  async function loadOrFail(){
    const {data:{session}} = await db.auth.getSession();
    const {data:pr} = await db.from("practices").select("*").eq("owner",session.user.id).maybeSingle();
    return pr;
  }
  async function doLogin(){
    setErr("");setBusy(true);
    try{
      const {error}=await db.auth.signInWithPassword({email,password:pw});
      if(error){setErr("Login fehlgeschlagen: "+error.message);setBusy(false);return;}
      const pr=await loadOrFail();
      if(!pr){setErr("Kein Praxis-Konto zu diesem Login gefunden.");setBusy(false);return;}
      onReady(pr);
    }catch(e){ setErr("Login fehlgeschlagen: "+e.message); setBusy(false); }
  }
  async function doRegister(){
    setErr("");setBusy(true);
    if(!pname.trim()){setErr("Bitte einen Praxisnamen angeben.");setBusy(false);return;}
    try{
      const {data,error}=await db.auth.signUp({email,password:pw});
      if(error){setErr("Registrierung fehlgeschlagen: "+error.message);setBusy(false);return;}
      if(!data.session){setErr("Bitte in Supabase die E-Mail-Bestätigung deaktivieren (README 1b).");setBusy(false);return;}
      let pr=null,lastErr=null;
      for(let tries=0;tries<4 && !pr;tries++){
        const {data:ins,error:e2}=await db.from("practices")
          .insert({owner:data.user.id,name:pname.trim(),join_code:randCode()}).select().single();
        if(!e2){pr=ins;break;}
        lastErr=e2;
        if(/name_unique|name.*duplicate|duplicate.*name/i.test(e2.message||"")){
          setErr("Dieser Praxisname ist bereits vergeben – bitte einen anderen wählen.");setBusy(false);return;}
      }
      if(!pr){setErr("Praxis konnte nicht angelegt werden: "+((lastErr&&lastErr.message)||""));setBusy(false);return;}
      onReady(pr);
    }catch(e){ setErr("Registrierung fehlgeschlagen: "+e.message); setBusy(false); }
  }
  async function doForgot(){
    setErr("");setMsg("");setBusy(true);
    const {error}=await db.auth.resetPasswordForEmail(email,{redirectTo:window.location.href});
    setBusy(false);
    if(error)setErr(error.message); else setMsg("E-Mail zum Zurücksetzen wurde versendet (sofern das Konto existiert).");
  }

  return <div className="center">
    <button className="btn sm sec" onClick={onBack}>← Zurück</button>
    <div className="card">
      <h2 style={{marginTop:0}}>Führungskraft</h2>
      <div className="row" style={{marginBottom:8}}>
        <button className={"btn sm "+(tab==="login"?"":"sec")} onClick={()=>setTab("login")}>Anmelden</button>
        <button className={"btn sm "+(tab==="register"?"":"sec")} onClick={()=>setTab("register")}>Registrieren</button>
        <button className={"btn sm "+(tab==="forgot"?"":"sec")} onClick={()=>setTab("forgot")}>Passwort?</button>
      </div>
      {err && <div className="err">{err}</div>}
      {msg && <div className="ok">{msg}</div>}
      {tab==="register" && <><label>Praxisname</label><input value={pname} onChange={e=>setPname(e.target.value)}/></>}
      <label>E-Mail</label><input type="email" value={email} onChange={e=>setEmail(e.target.value)}/>
      {tab!=="forgot" && <><label>Passwort</label><input type="password" value={pw} onChange={e=>setPw(e.target.value)}/></>}
      <div style={{marginTop:14}}>
        {tab==="login" && <button className="btn" disabled={busy} onClick={doLogin}>Anmelden</button>}
        {tab==="register" && <button className="btn" disabled={busy} onClick={doRegister}>Praxis anlegen</button>}
        {tab==="forgot" && <button className="btn" disabled={busy} onClick={doForgot}>Reset-Link senden</button>}
      </div>
    </div>
  </div>;
}

/* ---------- FK App ---------- */
function FKApp({practice,setPractice}){
  const [employees,setEmployees]=useState([]);
  const [presets,setPresets]=useState([]);
  const [sel,setSel]=useState(null);    // employee
  const [cycle,setCycle]=useState(null);
  const [err,setErr]=useState("");
  const [newInfo,setNewInfo]=useState(null); // zuletzt angelegter MA + Code
  const [showCatalog,setShowCatalog]=useState(false);
  const [ready,setReady]=useState(false); // Katalog vorbefüllt?

  useEffect(()=>{(async()=>{ await seedCatalogIfEmpty(practice.id); setReady(true); })();},[practice.id]);

  const load=useCallback(async()=>{
    const {data}=await db.from("employees").select("*").eq("practice_id",practice.id).order("created_at");
    setEmployees(data||[]);
  },[practice.id]);
  const loadPresets=useCallback(async()=>{
    const {data}=await db.from("weight_presets").select("*").eq("practice_id",practice.id).order("created_at");
    setPresets(data||[]);
  },[practice.id]);
  useEffect(()=>{load();loadPresets();},[load,loadPresets]);

  async function callFn(action,payload){
    const {data:{session}}=await db.auth.getSession();
    const r=await fetch(FN_BASE+"/manage-employee",{method:"POST",
      headers:{Authorization:"Bearer "+session.access_token,"Content-Type":"application/json"},
      body:JSON.stringify({action,...payload})});
    const j=await r.json(); if(!r.ok)throw new Error(j.error||"Fehler"); return j;
  }

  if(!ready) return <div className="center"><p className="muted">Lädt…</p></div>;
  if(showCatalog) return <CatalogManager practice={practice} onClose={()=>setShowCatalog(false)}/>;
  if(cycle) return <CycleEditor role="fk" practice={practice} employee={sel} cycle={cycle}
      onBack={()=>setCycle(null)} reloadCycle={setCycle}/>;
  if(sel) return <EmployeeView practice={practice} employee={sel} callFn={callFn} presets={presets}
      onBack={()=>{setSel(null);load();}} openCycle={setCycle}/>;

  return <div>
    <div className="card">
      <h2 style={{marginTop:0}}>{practice.name}</h2>
      <p className="muted">Mitarbeiter melden sich an mit: <b>Praxisname</b> „{practice.name}" + ihrem <b>Namen</b> + ihrem persönlichen <b>Zugangscode</b> (siehe Tabelle unten).</p>
    </div>
    {err && <div className="err">{err}</div>}

    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <div><h3 style={{margin:0}}>Kriterienkatalog</h3>
          <p className="muted" style={{marginBottom:0}}>Bereiche und Kriterien praxisweit bearbeiten – gilt für <b>alle</b> Mitarbeiter und künftigen Zyklen.</p></div>
        <button className="btn sm" onClick={()=>setShowCatalog(true)}>Katalog bearbeiten</button>
      </div>
    </div>

    <PresetsManager practice={practice} presets={presets} reload={loadPresets}/>

}

/* ---------- Gewichtungs-Vorlagen (Presets) ---------- */
function PresetsManager({practice,presets,reload}){
  const [editing,setEditing]=useState(null); // preset-Objekt oder {new:true}
  const [err,setErr]=useState("");

  if(editing) return <PresetEditor practice={practice} preset={editing}
      onClose={()=>{setEditing(null);reload();}}/>;

  async function create(){
    const name=prompt('Name der Gewichtungs-Vorlage (z. B. „ZFA Verwaltung", „Azubi"):','');
    if(!name||!name.trim())return;
    const {data,error}=await db.from("weight_presets")
      .insert({practice_id:practice.id,name:name.trim(),weights:{}}).select().single();
    if(error){setErr(error.message);return;}
    setEditing(data);
  }
  async function del(p){
    if(!confirm("Vorlage „"+p.name+"“ löschen? (bereits erstellte Zyklen bleiben unverändert)"))return;
    await db.from("weight_presets").delete().eq("id",p.id); reload();
  }

  return <div className="card">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
      <h3 style={{margin:0}}>Gewichtungs-Vorlagen</h3>
      <button className="btn sm" onClick={create}>+ Neue Vorlage</button>
    </div>
    <p className="muted">Legen Sie feste Gewichtungssätze an. Beim Start eines Bewertungszyklus können Sie eine Vorlage wählen (füllt die Gewichtung vor, bleibt anpassbar) – oder wie bisher alles manuell setzen.</p>
    {err&&<div className="err">{err}</div>}
    {presets.length===0
      ? <p className="muted">Noch keine Vorlage. Ohne Vorlage bewerten Sie die Gewichtung manuell im Zyklus.</p>
      : <table>
          <thead><tr><th>Name</th><th>Gewichtete Kriterien</th><th></th></tr></thead>
          <tbody>{presets.map(p=>{
            const cnt=Object.keys(p.weights||{}).filter(k=>p.weights[k]!=null).length;
            return <tr key={p.id}><td>{p.name}</td><td>{cnt}</td>
              <td style={{whiteSpace:"nowrap"}}>
                <button className="btn sm sec" onClick={()=>setEditing(p)}>Bearbeiten</button>{" "}
                <button className="btn sm danger" onClick={()=>del(p)}>Löschen</button></td></tr>;
          })}</tbody>
        </table>}
  </div>;
}

function PresetEditor({practice,preset,onClose}){
  const [weights,setWeights]=useState({...(preset.weights||{})});
  const wRef=useRef({...(preset.weights||{})});
  const [name,setName]=useState(preset.name);
  const [open,setOpen]=useState(0);
  const [saved,setSaved]=useState(""),[err,setErr]=useState("");
  const [catalog,setCatalog]=useState(null);
  useEffect(()=>{(async()=>{setCatalog(await loadCatalog(practice.id));})();},[practice.id]);
  const sections = catalog ? buildSections(catalog,[]) : [];

  function setG(k,v){
    const next={...wRef.current}; if(v==null) delete next[k]; else next[k]=v;
    wRef.current=next; setWeights(next);
  }
  async function save(){
    const {error}=await db.from("weight_presets")
      .update({name:name.trim()||preset.name,weights:wRef.current}).eq("id",preset.id);
    if(error){setErr(error.message);return;}
    setSaved("Gespeichert"); setTimeout(()=>setSaved(""),1400);
  }
  const setCount=Object.keys(weights).filter(k=>weights[k]!=null).length;

  return <div>
    <button className="btn sm sec" onClick={async()=>{await save();onClose();}}>← Speichern &amp; zurück</button>
    <div className="card">
      <h2 style={{marginTop:0}}>Vorlage bearbeiten</h2>
      {err&&<div className="err">{err}</div>}
      <label>Name der Vorlage</label>
      <input value={name} onChange={e=>setName(e.target.value)}/>
      <div className="prog"><span className="txt">{setCount} Kriterien gewichtet</span></div>
      <div className="row" style={{marginTop:10}}>
        <button className="btn" onClick={save}>Speichern</button>
        {saved&&<div className="ok" style={{flex:"0 0 auto"}}>{saved}</div>}
      </div>
      <p className="muted">Nur die Gewichtung (G) wird hier festgelegt. „–" bedeutet: betrifft die Rolle nicht.</p>
    </div>
    {!catalog && <div className="card muted">Katalog lädt…</div>}
    {sections.map((sec,si)=>{
      const cnt=sec.items.filter(it=>weights[it.key]!=null).length;
      return <div key={si}>
        <div className="sec-head" onClick={()=>setOpen(open===si?-1:si)}>
          <span>{sec.name}</span><span className="muted">{cnt}/{sec.items.length} · {open===si?"▲":"▼"}</span>
        </div>
        {open===si && <div className="card" style={{marginTop:4}}>
          {sec.items.map(it=>
            <div className="item" key={it.key}>
              <div style={{fontWeight:"bold"}}>{it.k}</div>
              {it.d&&<div className="muted" style={{marginBottom:6}}>{it.d}</div>}
              <label>Gewichtung (G)</label>
              <Picker scale={G_SCALE} g value={weights[it.key]??null} onChange={v=>setG(it.key,v)}/>
            </div>)}
        </div>}
      </div>;
    })}
    <div className="card"><button className="btn" onClick={async()=>{await save();onClose();}}>Speichern &amp; zurück</button></div>
  </div>;
}

/* ---------- Katalog-Editor (praxisweit, nur Führungskraft) ---------- */
function CatalogManager({practice,onClose}){
  const [secs,setSecs]=useState([]);
  const [items,setItems]=useState([]);
  const [open,setOpen]=useState(-1);
  const [err,setErr]=useState(""),[busy,setBusy]=useState(false);
  const load=useCallback(async()=>{
    const {data:s}=await db.from("catalog_sections").select("*").eq("practice_id",practice.id).order("sort_order");
    const {data:i}=await db.from("catalog_items").select("*").eq("practice_id",practice.id).order("sort_order");
    setSecs(s||[]); setItems(i||[]);
  },[practice.id]);
  useEffect(()=>{load();},[load]);

  const itemsOf=(sid)=>items.filter(i=>i.section_id===sid).sort((a,b)=>a.sort_order-b.sort_order);
  async function run(promise){
    setBusy(true); const {error}=await promise; setBusy(false);
    if(error){setErr(error.message);return false;}
    setErr(""); await load(); return true;
  }
  async function addSection(){
    const name=prompt("Name des neuen Bereichs:","");
    if(!name||!name.trim())return;
    const order=secs.reduce((m,s)=>Math.max(m,s.sort_order),-1)+1;
    await run(db.from("catalog_sections").insert({practice_id:practice.id,name:name.trim(),sort_order:order}));
  }
  async function renameSection(s){
    const name=prompt("Bereich umbenennen:",s.name);
    if(name==null||!name.trim())return;
    await run(db.from("catalog_sections").update({name:name.trim()}).eq("id",s.id));
  }
  async function delSection(s){
    if(!confirm("Bereich „"+s.name+"“ mit ALLEN darin enthaltenen Kriterien löschen? Gilt praxisweit für alle Mitarbeiter."))return;
    await run(db.from("catalog_sections").delete().eq("id",s.id));
  }
  async function swap(table,a,b){
    setBusy(true);
    await db.from(table).update({sort_order:b.sort_order}).eq("id",a.id);
    await db.from(table).update({sort_order:a.sort_order}).eq("id",b.id);
    setBusy(false); await load();
  }
  async function moveSection(s,dir){
    const sorted=[...secs].sort((a,b)=>a.sort_order-b.sort_order);
    const idx=sorted.findIndex(x=>x.id===s.id), j=idx+dir;
    if(j<0||j>=sorted.length)return;
    await swap("catalog_sections",s,sorted[j]);
  }
  async function addItem(s,criterion,description){
    const order=itemsOf(s.id).reduce((m,i)=>Math.max(m,i.sort_order),-1)+1;
    await run(db.from("catalog_items").insert({practice_id:practice.id,section_id:s.id,item_key:uid(),criterion,description:description||null,sort_order:order}));
  }
  async function saveItem(it,criterion,description){
    await run(db.from("catalog_items").update({criterion,description:description||null}).eq("id",it.id));
  }
  async function delItem(it){
    if(!confirm("Kriterium „"+it.criterion+"“ löschen? Gilt praxisweit für alle Mitarbeiter."))return;
    await run(db.from("catalog_items").delete().eq("id",it.id));
  }
  async function moveItem(it,dir){
    const list=itemsOf(it.section_id), idx=list.findIndex(x=>x.id===it.id), j=idx+dir;
    if(j<0||j>=list.length)return;
    await swap("catalog_items",it,list[j]);
  }

  return <div>
    <button className="btn sm sec" onClick={onClose}>← Zurück zur Übersicht</button>
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
        <h2 style={{margin:0}}>Kriterienkatalog bearbeiten</h2>
        <button className="btn sm" onClick={addSection}>+ Neuer Bereich</button>
      </div>
      <p className="muted">Änderungen gelten praxisweit für <b>alle</b> Mitarbeiter und künftigen Zyklen. Bereits erfasste Bewertungen zu gelöschten Kriterien entfallen. Die individuelle Ergänzung pro Mitarbeiter (im Zyklus) bleibt davon unberührt.</p>
      {err&&<div className="err">{err}</div>}
      {busy&&<div className="muted">Speichere…</div>}
    </div>
    {secs.map((s,i)=>{
      const list=itemsOf(s.id);
      return <div key={s.id}>
        <div className="sec-head" onClick={()=>setOpen(open===i?-1:i)}>
          <span>{s.name}</span><span className="muted">{list.length} · {open===i?"▲":"▼"}</span>
        </div>
        {open===i && <div className="card" style={{marginTop:4}}>
          <div className="row" style={{marginBottom:8}}>
            <button className="btn sm sec" disabled={busy} onClick={()=>moveSection(s,-1)}>▲ Bereich hoch</button>
            <button className="btn sm sec" disabled={busy} onClick={()=>moveSection(s,1)}>▼ Bereich runter</button>
            <button className="btn sm sec" disabled={busy} onClick={()=>renameSection(s)}>Umbenennen</button>
            <button className="btn sm danger" disabled={busy} onClick={()=>delSection(s)}>Bereich löschen</button>
          </div>
          {list.map(it=><CatalogItemRow key={it.id} it={it} busy={busy} onSave={saveItem} onDel={delItem} onMove={moveItem}/>)}
          {list.length===0 && <p className="muted">Noch keine Kriterien in diesem Bereich.</p>}
          <CatalogAddItem busy={busy} onAdd={(k,d)=>addItem(s,k,d)}/>
        </div>}
      </div>;
    })}
    {secs.length===0 && <div className="card muted">Katalog wird geladen …</div>}
    <div className="card"><button className="btn" onClick={onClose}>Fertig</button></div>
  </div>;
}

        <button className="btn sm sec" disabled={busy} title="nach unten" onClick={()=>onMove(it,1)}>▼</button>{" "}
        <button className="btn sm sec" onClick={()=>setEdit(true)}>Bearbeiten</button>{" "}
        <button className="btn sm danger" disabled={busy} onClick={()=>onDel(it)}>Löschen</button>
      </div>
    </div>
  </div>;
}

function EmployeeView({practice,employee,callFn,onBack,openCycle,presets}){
  const [cycles,setCycles]=useState([]);
  const [flag,setFlag]=useState({}); // cycle_id -> true, wenn MA-Ergänzung noch nicht gegenbewertet
  const [err,setErr]=useState("");
  const [info,setInfo]=useState("");
  const [showNew,setShowNew]=useState(false);
  const load=useCallback(async()=>{
    const {data}=await db.from("cycles").select("*").eq("employee_id",employee.id).order("created_at",{ascending:false});
    setCycles(data||[]);
    const ids=(data||[]).map(c=>c.id);
    if(ids.length){
      const {data:cust}=await db.from("custom_items").select("cycle_id,item_key,author").in("cycle_id",ids).eq("author","ma");
      const {data:fkr}=await db.from("fk_ratings").select("cycle_id,item_key,g,b").in("cycle_id",ids);
      const rated={}; (fkr||[]).forEach(r=>{if(r.g!=null||r.b!=null)rated[r.cycle_id+"|"+r.item_key]=true;});
      const f={}; (cust||[]).forEach(c=>{if(!rated[c.cycle_id+"|"+c.item_key])f[c.cycle_id]=true;});
      setFlag(f);
    } else setFlag({});
  },[employee.id]);
  useEffect(()=>{load();},[load]);

  async function createCycle({title,period,preset}){
    const {data,error}=await db.from("cycles")
      .insert({practice_id:practice.id,employee_id:employee.id,title,period}).select().single();
    if(error){setErr(error.message);return;}
    // Gewichtung aus Vorlage vorbefüllen (bleibt im Zyklus editierbar)
    if(preset && preset.weights){
      const rows=Object.entries(preset.weights)
        .filter(([,g])=>g!=null)
        .map(([item_key,g])=>({cycle_id:data.id,item_key,g}));
      if(rows.length) await db.from("fk_ratings").upsert(rows,{onConflict:"cycle_id,item_key"});
    }
    setShowNew(false); openCycle(data);
  }

  return <div>
    <button className="btn sm sec" onClick={onBack}>← Übersicht</button>
    <div className="card">
      <h2 style={{marginTop:0}}>{employee.name}</h2><p className="muted">{employee.position}</p>
      {err&&<div className="err">{err}</div>}
      <p className="muted">
        {employee.must_change_pw
          ? <>Erst-Login-Code: <span className="tag">{employee.code||"–"}</span> — damit meldet sich {employee.name} <b>einmalig</b> an (Praxisname „{practice.name}" + Name + Code) und legt danach ein eigenes Passwort fest.</>
          : <>Zugang <b>aktiviert</b> · eigenes Passwort · {employee.email? "E-Mail hinterlegt: "+employee.email : "keine E-Mail hinterlegt"}. Der ursprüngliche Code ist nicht mehr gültig.</>}
      </p>
      {info&&<div className="ok">{info}</div>}
      <div className="row" style={{marginTop:8}}>
        <div style={{display:"flex",alignItems:"flex-end",gap:8,flexWrap:"wrap"}}>
          <button className="btn sm sec" onClick={async()=>{try{await callFn("set_active",{employee_id:employee.id,active:!employee.active});onBack();}catch(e){setErr(e.message);}}}>{employee.active?"Deaktivieren":"Aktivieren"}</button>
          <button className="btn sm sec" onClick={async()=>{
            if(!confirm("Neuen Zugangscode vergeben? Das aktuelle Passwort bzw. der alte Code wird ungültig. "+employee.name+" meldet sich dann einmalig mit dem neuen Code an und legt ein neues Passwort fest."))return;
            try{const code=randCode(); await callFn("reset_code",{employee_id:employee.id,code}); setErr(""); setInfo("Neuer Zugangscode: "+code+" — bitte "+employee.name+" geben.");}catch(e){setErr(e.message);}
          }}>Neuen Zugangscode vergeben</button>
          <button className="btn sm danger" onClick={async()=>{if(confirm("Mitarbeiter und alle Bewertungen löschen?")){try{await callFn("delete",{employee_id:employee.id});onBack();}catch(e){setErr(e.message);}}}}>Löschen</button>
        </div>
      </div>
    </div>
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h3 style={{margin:0}}>Bewertungszyklen</h3>
        <button className="btn sm" onClick={()=>setShowNew(v=>!v)}>{showNew?"Abbrechen":"+ Neuer Zyklus"}</button></div>
      {showNew && <NewCycleForm presets={presets} onCreate={createCycle}/>}
      <table style={{marginTop:10}}>
        <thead><tr><th>Titel</th><th>Zeitraum</th><th>Status</th><th></th></tr></thead>
        <tbody>{cycles.map(c=>
          <tr key={c.id}><td>{c.title||"–"}</td><td>{c.period||"–"}</td>
            <td><StatusPill s={c.status}/>{flag[c.id] && <span className="pill locked" style={{marginLeft:6}} title="Mitarbeiter hat Kriterien ergänzt – bitte gegenbewerten">MA-Ergänzung</span>}</td>
            <td><button className="btn sm sec" onClick={()=>openCycle(c)}>Öffnen</button></td></tr>)}
          {cycles.length===0&&<tr><td colSpan="4" className="muted">Noch kein Zyklus.</td></tr>}
        </tbody></table>
    </div>
  </div>;
}

/* ---------- Cycle Editor (FK & MA) ---------- */
function CycleEditor({role,practice,employee,cycle,onBack,reloadCycle}){
  const isFK = role==="fk";
  const practiceId = practice ? practice.id : (employee && employee.practice_id);
  const [fk,setFk]=useState({}); const [ma,setMa]=useState({});
  const fkRef=useRef({}); const maRef=useRef({}); const chains=useRef({});
  const [open,setOpen]=useState(-1); const [tab,setTab]=useState("edit");
  const [err,setErr]=useState(""),[saved,setSaved]=useState("");
  const [status,setStatus]=useState(cycle.status);
  const [customs,setCustoms]=useState([]); // eigene Kriterien (custom_items)
  const [catalog,setCatalog]=useState(null); // Praxis-Katalog aus DB
  const [resume,setResume]=useState(null); // {section_index,item_key} zuletzt bearbeitet
  const posChain=useRef(Promise.resolve());

  useEffect(()=>{(async()=>{ setCatalog(await loadCatalog(practiceId)); })();},[practiceId]);

  // Schreibvorgänge pro Kriterium in Reihenfolge ausführen (keine Race-Conditions)
  function enqueue(table,k,row){
    const key=table+"_"+k;
    const prev=chains.current[key]||Promise.resolve();
    const next=prev.then(async()=>{
      const {error}=await db.from(table).upsert(row,{onConflict:"cycle_id,item_key"});
      if(error)setErr(error.message); else flash();
    });
    chains.current[key]=next.catch(()=>{});
  }

  useEffect(()=>{(async()=>{
    if(isFK){
      const {data}=await db.from("fk_ratings").select("*").eq("cycle_id",cycle.id);
      const m={};(data||[]).forEach(r=>m[r.item_key]={g:r.g,b:r.b}); fkRef.current=m; setFk(m);
    }
    const {data:md}=await db.from("ma_ratings").select("*").eq("cycle_id",cycle.id);
    const mm={};(md||[]).forEach(r=>mm[r.item_key]={b:r.b}); maRef.current=mm; setMa(mm);
    const {data:cu}=await db.from("custom_items").select("*").eq("cycle_id",cycle.id).order("id");
    setCustoms(cu||[]);
    // zuletzt bearbeitete Position laden (geräteübergreifend)
    const {data:pos}=await db.from("cycle_progress").select("*")
      .eq("cycle_id",cycle.id).eq("role",role).maybeSingle();
    if(pos && pos.item_key) setResume({section_index:pos.section_index,item_key:pos.item_key});
  })();},[cycle.id,isFK,role]);

  const maEditable = !isFK && status==="released";

  // Position (Sprungmarke) geräteübergreifend speichern – nacheinander, ohne Blockieren.
  function savePos(section_index,item_key){
    posChain.current=posChain.current.then(async()=>{
      await db.from("cycle_progress").upsert(
        {cycle_id:cycle.id,role,section_index,item_key,updated_at:new Date().toISOString()},
        {onConflict:"cycle_id,role"});
    }).catch(()=>{});
  }

  async function addCustom(sectionName, criterion, description){
    const key=uid();
    const {data,error}=await db.from("custom_items")
      .insert({cycle_id:cycle.id,item_key:key,section:sectionName,criterion,description:description||null,author:isFK?"fk":"ma"})
      .select().single();
    if(error){setErr(error.message);return;}
    setCustoms(cs=>[...cs,data]);
  }
  async function delCustom(it){
    const q=(!isFK && it.author==="ma") ? "Ihre Ergänzung „"+it.k+"“ löschen?" : "Eigenes Kriterium „"+it.k+"“ löschen?";
    if(!confirm(q))return;
    const {error}=await db.from("custom_items").delete().eq("id",it.id);
    if(error){setErr(error.message);return;}
    await db.from("ma_ratings").delete().eq("cycle_id",cycle.id).eq("item_key",it.key);
    if(isFK) await db.from("fk_ratings").delete().eq("cycle_id",cycle.id).eq("item_key",it.key);
    setCustoms(cs=>cs.filter(c=>c.id!==it.id));
  }

  function saveFk(si,k,patch){
    const cur=fkRef.current[k]||{g:null,b:null}; const next={...cur,...patch};
    fkRef.current={...fkRef.current,[k]:next}; setFk(fkRef.current);
    enqueue("fk_ratings",k,{cycle_id:cycle.id,item_key:k,g:next.g,b:next.b});
    savePos(si,k);
  }
  function saveMa(si,k,b){
    maRef.current={...maRef.current,[k]:{b}}; setMa(maRef.current);
    enqueue("ma_ratings",k,{cycle_id:cycle.id,item_key:k,b});
    savePos(si,k);
  }
  function flash(){setSaved("Gespeichert");clearTimeout(window.__t);window.__t=setTimeout(()=>setSaved(""),1200);}

  async function setStatusTo(s){
    const {data,error}=await db.from("cycles").update({status:s,updated_at:new Date().toISOString()}).eq("id",cycle.id).select().single();
    if(error){setErr(error.message);return;} setStatus(s); if(reloadCycle)reloadCycle(data);
  }

  function jumpTo(section_index,item_key){
    setOpen(section_index);
    setTimeout(()=>{
      const el=document.getElementById("it-"+item_key);
      if(el){el.scrollIntoView({behavior:"smooth",block:"center"});
        el.classList.add("hl"); setTimeout(()=>el.classList.remove("hl"),2200);}
    },60);
  }

  if(!catalog) return <div className="center"><p className="muted">Lädt…</p></div>;
  const sections = buildSections(catalog, customs);
  const comp = computeAll(sections, fk, ma);

  // rollenbezogener Fortschritt (für den Balken)
  let totalItems=0, doneItems=0;
  sections.forEach(sec=>sec.items.forEach(it=>{
    totalItems++;
    if(isFK){ const f=fk[it.key]||{}; if(f.g!=null||f.b!=null) doneItems++; }
    else { if((ma[it.key]||{}).b!=null) doneItems++; }
  }));
  const progPct = totalItems? Math.round(doneItems/totalItems*100) : 0;

  const resumeSecName = resume!=null && sections[resume.section_index] ? sections[resume.section_index].name : null;

  return <div>
    <button className="btn sm sec" onClick={onBack}>← Zurück</button>
    <div className="card">
      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div><h2 style={{marginTop:0}}>{cycle.title||"Bewertungszyklus"}</h2>
          <p className="muted">{employee?employee.name:""} {cycle.period?"· "+cycle.period:""} · <StatusPill s={status}/></p></div>
        <div className="row" style={{flex:"0 0 auto",alignItems:"flex-start"}}>
          {isFK && status==="draft" && <button className="btn sm" onClick={()=>setStatusTo("released")}>Für Mitarbeiter freigeben</button>}
          {isFK && status==="released" && <button className="btn sm" onClick={()=>setStatusTo("locked")}>Bearbeitung sperren</button>}
          {isFK && status==="locked" && <button className="btn sm sec" onClick={()=>setStatusTo("released")}>Wieder freigeben</button>}
          {isFK && (status==="locked"||status==="released") && <button className="btn sm" onClick={()=>setStatusTo("completed")}>Abschließen</button>}
          {isFK && status==="completed" && <button className="btn sm sec" onClick={()=>setStatusTo("locked")}>Wieder bearbeiten</button>}
          {isFK && <button className="btn sm" onClick={()=>exportWord(practice,employee,cycle,comp,fk,ma,sections)}>Word herunterladen</button>}
        </div>
      </div>
      {err&&<div className="err">{err}</div>}
      {saved&&<div className="ok" style={{display:"inline-block"}}>{saved}</div>}
      {!isFK && status!=="released" && <div className="err">Diese Bewertung ist aktuell {status==="locked"?"gesperrt":"abgeschlossen"} – nur Ansicht, keine Änderungen möglich.</div>}

      {tab==="edit" && <div className="prog">
        <div className="bar"><i style={{width:progPct+"%"}}></i></div>
        <span className="txt">{doneItems}/{totalItems} bearbeitet ({progPct} %)</span>
      </div>}
      {tab==="edit" && resume && resumeSecName &&
        <div style={{marginTop:8}}>
          <button className="btn sm sec" onClick={()=>jumpTo(resume.section_index,resume.item_key)}>▶ Weiter, wo Sie waren · {resumeSecName}</button>
        </div>}

      <div className="row" style={{marginTop:10}}>
        <button className={"btn sm "+(tab==="edit"?"":"sec")} onClick={()=>setTab("edit")}>Bewertung</button>
        {isFK && <button className={"btn sm "+(tab==="eval"?"":"sec")} onClick={()=>setTab("eval")}>Auswertung</button>}
      </div>
    </div>

    {tab==="edit" && sections.map((sec,si)=>{
      const sc=comp.sections[si];
      return <div key={si}>
        <div className="sec-head" onClick={()=>{const n=open===si?-1:si; setOpen(n); if(n>=0) savePos(si, (sec.items[0]||{}).key||"");}}>
          <span>{sec.name}</span><span className="muted">{sc.done}/{sc.total} · {open===si?"▲":"▼"}</span>
        </div>
        {open===si && <div className="card" style={{marginTop:4}}>
          {sec.items.map((it)=>{
            const k=it.key; const f=fk[k]||{}; const mb=(ma[k]||{}).b;
            const maAdded = it.custom && it.author==="ma";
            const needsFk = isFK && maAdded && !(f.g!=null||f.b!=null);
            return <div className="item" id={"it-"+k} key={k}
                style={needsFk?{borderLeft:"3px solid var(--brand)",paddingLeft:8}:null}>
              <div style={{fontWeight:"bold"}}>{it.k}
                {it.custom && <span className="muted" style={{fontWeight:"normal"}}> · {maAdded?(isFK?"vom Mitarbeiter ergänzt":"von Ihnen ergänzt"):"eigenes Kriterium"}</span>}
                {needsFk && <span className="pill locked" style={{marginLeft:8}}>bitte gegenbewerten</span>}</div>
              {it.d && <div className="muted" style={{marginBottom:6}}>{it.d}</div>}
              {isFK && <div className="grid2">
                <div><label>Gewichtung (G)</label><Picker scale={G_SCALE} g value={f.g??null} onChange={v=>saveFk(si,k,{g:v})}/></div>
                <div><label>Bewertung Führungskraft (B)</label><Picker scale={B_SCALE} value={f.b??null} onChange={v=>saveFk(si,k,{b:v})}/></div>
              </div>}
              {isFK && <div className="muted" style={{marginTop:6}}>Selbsteinschätzung MA: <b>{mb??"–"}</b>
                {it.custom && <button className="btn sm danger" style={{marginLeft:10}} onClick={()=>delCustom(it)}>Kriterium löschen</button>}</div>}
              {!isFK && <div><label>Ihre Selbsteinschätzung (1–5)</label>
                <Picker scale={B_SCALE} value={mb??null} disabled={!maEditable} onChange={v=>saveMa(si,k,v)}/></div>}
              {!isFK && maAdded && maEditable && <div style={{marginTop:6}}>
                <button className="btn sm danger" onClick={()=>delCustom(it)}>Meine Ergänzung löschen</button></div>}
            </div>;
          })}
          {(isFK || maEditable) && <AddCustom role={role} onAdd={(krit,besch)=>addCustom(sec.name,krit,besch)}/>}
        </div>}
      </div>;
    })}

    {tab==="eval" && isFK && <Eval comp={comp}/>}
  </div>;
}

function AddCustom({onAdd,role}){
  const isMA = role==="ma";
  const [open,setOpen]=useState(false);
  const [krit,setKrit]=useState(""),[besch,setBesch]=useState("");
  if(!open) return <div style={{marginTop:10}}>
    <button className="btn sm sec" onClick={()=>setOpen(true)}>+ {isMA?"Eigene Aufgabe / Kriterium ergänzen":"Eigenes Kriterium in diesem Bereich hinzufügen"}</button></div>;
  return <div className="item" style={{marginTop:10,background:"var(--brand-l)",borderRadius:8,padding:10}}>
    {isMA && <div className="muted" style={{marginBottom:6}}>Ihre Ergänzung wird der Führungskraft angezeigt und von ihr gegenbewertet.</div>}
    <label>Neues Kriterium (Name)</label>
    <input value={krit} onChange={e=>setKrit(e.target.value)} placeholder="z. B. Spezialaufgabe XY"/>
    <label>Beschreibung (optional)</label>
    <input value={besch} onChange={e=>setBesch(e.target.value)}/>
    <div className="row" style={{marginTop:8}}>
      <button className="btn sm" onClick={()=>{if(krit.trim()){onAdd(krit.trim(),besch.trim());setKrit("");setBesch("");setOpen(false);}}}>Hinzufügen</button>
      <button className="btn sm sec" onClick={()=>{setOpen(false);setKrit("");setBesch("");}}>Abbrechen</button>
    </div>
  </div>;
}

function Eval({comp}){
  return <div className="card">
    <h3 style={{marginTop:0}}>Auswertung (Nutzwert = Gewichtung × Bewertung)</h3>
    <table>
      <thead><tr><th>Bereich</th><th>Max.</th><th>Erreicht MA</th><th>Erreicht FK</th><th>Ø</th><th>Übereinst.</th></tr></thead>

        <tr key={s.si}><td>{s.name}</td><td>{s.max}</td><td>{s.nMa}</td><td>{s.nFk}</td>

function RecoveryReset({onDone}){

/* ---------- MA Login ---------- */
function MALogin({onBack,onReady}){
  const [pname,setPname]=useState(""),[name,setName]=useState(""),[code,setCode]=useState("");
  const [err,setErr]=useState(""),[msg,setMsg]=useState(""),[busy,setBusy]=useState(false);
  const [forgot,setForgot]=useState(false),[remail,setRemail]=useState("");
  async function go(){
    setErr("");setMsg("");setBusy(true);
    try{
      const r=await fetch(FN_BASE+"/employee-login",{method:"POST",
        headers:{Authorization:"Bearer "+CFG.SUPABASE_ANON_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({practice_name:pname,name,code})});
      const j=await r.json();
      if(!r.ok)throw new Error(j.error||"Login fehlgeschlagen");
      await db.auth.setSession({access_token:j.access_token,refresh_token:j.refresh_token});
      onReady();
    }catch(e){setErr(e.message);setBusy(false);}
  }
  async function doForgot(){
    setErr("");setMsg("");
    if(!remail.trim()){setErr("Bitte Ihre hinterlegte E-Mail eingeben.");return;}
    setBusy(true);
    const {error}=await db.auth.resetPasswordForEmail(remail.trim(),{redirectTo:window.location.href});
    setBusy(false);
    if(error)setErr(error.message);
    else setMsg("Wenn zu dieser E-Mail ein Konto besteht, wurde ein Link zum Zurücksetzen verschickt.");
  }
  return <div className="center">
    <button className="btn sm sec" onClick={onBack}>← Zurück</button>
    <div className="card">
      <h2 style={{marginTop:0}}>Mitarbeiter:in – Anmeldung</h2>
      <p className="muted">Beim <b>ersten Mal</b> melden Sie sich mit dem <b>Zugangscode</b> Ihrer Praxis an und legen danach Ihr <b>eigenes Passwort</b> fest. Danach nutzen Sie Ihr Passwort. Mit einer eigenen E-Mail können Sie ein vergessenes Passwort selbst zurücksetzen.</p>
      {err&&<div className="err">{err}</div>}
      {msg&&<div className="ok">{msg}</div>}
      {!forgot ? <>
        <label>Praxisname</label><input value={pname} onChange={e=>setPname(e.target.value)} placeholder="Name der Praxis"/>
        <label>Ihr Name</label><input value={name} onChange={e=>setName(e.target.value)}/>
        <label>Zugangscode (erstes Mal) oder Ihr Passwort</label>
        <input type="password" value={code} onChange={e=>setCode(e.target.value)}/>
        <div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn" disabled={busy} onClick={go}>Anmelden</button>
          <button className="btn sec" onClick={()=>{setForgot(true);setErr("");setMsg("");}}>Passwort vergessen?</button>
        </div>
      </> : <>
        <p className="muted">Geben Sie Ihre hinterlegte E-Mail ein – Sie erhalten einen Link zum Zurücksetzen. (Nur möglich, wenn Sie zuvor eine E-Mail hinterlegt haben.)</p>
        <label>Ihre E-Mail</label><input type="email" value={remail} onChange={e=>setRemail(e.target.value)}/>
        <div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap"}}>
          <button className="btn" disabled={busy} onClick={doForgot}>Link senden</button>
          <button className="btn sec" onClick={()=>{setForgot(false);setErr("");setMsg("");}}>Zurück zur Anmeldung</button>
        </div>
      </>}
    </div>
  </div>;
}

/* ---------- Word-Export ---------- */
// Logo einmalig laden und als Data-URL für den Word-Export bereitstellen.
async function logoDataUrl(){
  try{
    const r=await fetch(LOGO_URL); const b=await r.blob();
    return await new Promise(res=>{const fr=new FileReader();fr.onload=()=>res(fr.result);fr.readAsDataURL(b);});
  }catch(e){ return ""; }
}

async function exportWord(practice,employee,cycle,comp,fk,ma,sections){
  const esc=s=>(s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  let body="";
  (sections||[]).forEach((sec)=>{
    body+=`<h2 style="color:${BRAND}">${esc(sec.name)}</h2>`;
    body+=`<table border="1" cellspacing="0" cellpadding="3" style="border-collapse:collapse;width:100%;font-size:9pt">
      <tr style="background:${BRAND_L};color:${BRAND}">
        <th>Kriterium</th><th>Beschreibung</th><th>G</th><th>B&nbsp;MA</th><th>B&nbsp;FK</th><th>Nutzwert&nbsp;FK</th><th>Übereinst.</th></tr>`;
    sec.items.forEach((it)=>{
      const k=it.key; const f=fk[k]||{}; const mb=(ma[k]||{}).b;
      const ag=(f.b&&mb)?Math.round((1-Math.abs(mb-f.b)/5)*100)+" %":"–";
      body+=`<tr><td>${esc(it.k)}</td><td>${esc(it.d)}</td><td align="center">${f.g??"–"}</td>
        <td align="center">${mb??"–"}</td><td align="center">${f.b??"–"}</td>
        <td align="center">${(f.g&&f.b)?f.g*f.b:"–"}</td><td align="center">${ag}</td></tr>`;
    });
    body+="</table><br/>";
  });
  let eval_=`<h2 style='color:${BRAND}'>Gesamtauswertung je Bereich</h2><table border='1' cellspacing='0' cellpadding='3' style='border-collapse:collapse;width:100%;font-size:9pt'><tr style='background:${BRAND_L};color:${BRAND}'><th>Bereich</th><th>Max.&nbsp;Punktzahl</th><th>Erreicht&nbsp;MA</th><th>Erreicht&nbsp;FK</th><th>Ø&nbsp;(MA+FK)/2</th><th>Übereinst.&nbsp;%</th></tr>`;
  comp.sections.forEach(s=>{eval_+=`<tr><td>${esc(s.name)}</td><td align='center'>${s.max}</td><td align='center'>${s.nMa}</td><td align='center'>${s.nFk}</td><td align='center'>${fmt1((s.nMa+s.nFk)/2)}</td><td align='center'>${pct(s.agree)}</td></tr>`;});
  eval_+=`<tr style='font-weight:bold;background:${BRAND_L}'><td>GESAMT</td><td align='center'>${comp.tot.max}</td><td align='center'>${comp.tot.nMa}</td><td align='center'>${comp.tot.nFk}</td><td align='center'>${fmt1((comp.tot.nMa+comp.tot.nFk)/2)}</td><td align='center'>${pct(comp.tot.agree)}</td></tr></table><br/>`;

  const durl=await logoDataUrl();
  const logo=durl?`<p align="right" style="margin:0 0 4pt"><img src="${durl}" style="height:26px"/></p>`:"";
  const html=`<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word'>
  <head><meta charset="utf-8"><style>body{font-family:Arial;font-size:10pt;color:#222}h1{color:${BRAND};font-size:17pt;margin:0 0 6pt}h2{color:${BRAND};font-size:12pt;margin:14pt 0 4pt}p{font-size:10pt}table{font-size:9pt}</style></head>
  <body>${logo}<h1>Stärken- &amp; Kompetenzprofil</h1>
  <p><b>Praxis:</b> ${esc(practice.name)}<br/><b>Mitarbeiter:in:</b> ${esc(employee?employee.name:"")}<br/>
  <b>Beurteilung:</b> ${esc(cycle.title||"")}<br/><b>Zeitraum:</b> ${esc(cycle.period||"")}</p>
  ${eval_}${body}</body></html>`;

  const blob=new Blob(["﻿"+html],{type:"application/msword"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download=`Kompetenzprofil_${(employee&&employee.name||"MA").replace(/\s+/g,"_")}.doc`;
  a.click();
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
